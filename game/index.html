<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Patrol Bot - 室内巡逻机器人</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      #game-container {
        position: relative;
        margin-top: 10px;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      }
      #game-container canvas { display: block; }
      .loading-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 800px;
        height: 600px;
        background: #16213e;
        color: #e94560;
        font-size: 24px;
      }
      .loading-screen .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #333;
        border-top-color: #e94560;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* 顶部栏 */
      .topbar {
        width: 800px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
      }
      .topbar h1 { font-size: 18px; color: #f8fafc; }
      .topbar .links { display: flex; align-items: center; gap: 12px; }
      .topbar .links a {
        color: #64748b;
        text-decoration: none;
        font-size: 13px;
      }
      .topbar .links a:hover { color: #3b82f6; }
      .topbar .links .settings-btn {
        background: #334155;
        border: 1px solid #475569;
        color: #e2e8f0;
        padding: 4px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      .topbar .links .settings-btn:hover { background: #3b82f6; }
      .topbar .links .settings-btn.active { background: #3b82f6; }

      /* Provider 设置面板 */
      #settings-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.6);
        z-index: 1100;
        justify-content: center;
        align-items: center;
      }
      #settings-overlay.active { display: flex; }
      .settings-panel {
        background: #1e293b;
        border: 1px solid #475569;
        border-radius: 12px;
        padding: 24px;
        width: 460px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      }
      .settings-panel h2 {
        color: #f8fafc;
        font-size: 18px;
        margin-bottom: 16px;
      }
      .settings-panel label {
        display: block;
        color: #94a3b8;
        font-size: 13px;
        margin-bottom: 4px;
        margin-top: 12px;
      }
      .settings-panel select,
      .settings-panel input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #475569;
        border-radius: 6px;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 14px;
      }
      .settings-panel select:focus,
      .settings-panel input:focus {
        border-color: #3b82f6;
        outline: none;
      }
      .settings-panel .hint {
        color: #64748b;
        font-size: 12px;
        margin-top: 4px;
      }
      .settings-panel .btn-row {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .settings-panel .btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .settings-panel .btn.primary { background: #3b82f6; color: #fff; }
      .settings-panel .btn.primary:hover { background: #2563eb; }
      .settings-panel .btn.secondary { background: #334155; color: #e2e8f0; }
      .settings-panel .btn.secondary:hover { background: #475569; }

      /* 相机面板（风险识别结果浮层） */
      #risk-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      #risk-overlay.active { display: flex; }
      .risk-panel {
        background: #1e293b;
        border: 1px solid #475569;
        border-radius: 12px;
        padding: 20px;
        width: 720px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      }
      .risk-panel h2 {
        color: #f8fafc;
        font-size: 18px;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .risk-panel .risk-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 700;
      }
      .risk-badge.high { background: #dc2626; color: #fff; }
      .risk-badge.medium { background: #f59e0b; color: #1e293b; }
      .risk-badge.low { background: #22c55e; color: #1e293b; }
      .risk-badge.safe { background: #3b82f6; color: #fff; }

      /* 相机视图区域 */
      .camera-view {
        background: #0f172a;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
      }
      .camera-view .camera-label {
        color: #64748b;
        font-size: 12px;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .camera-view img {
        width: 100%;
        border-radius: 6px;
        display: block;
      }
      .camera-view .camera-placeholder {
        width: 100%;
        height: 200px;
        border-radius: 6px;
        background: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #475569;
        font-size: 14px;
      }

      /* 风险结果列表 */
      .risk-item {
        background: #0f172a;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
      }
      .risk-item p {
        font-size: 13px;
        color: #94a3b8;
        margin: 4px 0;
        line-height: 1.5;
      }
      .risk-item strong { color: #e2e8f0; }
      .risk-panel .close-btn {
        width: 100%;
        padding: 10px;
        margin-top: 12px;
        border: none;
        border-radius: 8px;
        background: #3b82f6;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
      .risk-panel .close-btn:hover { background: #2563eb; }

      /* 扫描中状态 */
      .scanning {
        text-align: center;
        padding: 30px;
        color: #64748b;
      }
      .scanning .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #334155;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
      }
      .scanning .scan-bar {
        width: 100%;
        height: 3px;
        background: #334155;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 12px;
      }
      .scanning .scan-bar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        background: #3b82f6;
        border-radius: 2px;
        animation: scan-move 1.2s ease-in-out infinite;
      }
      @keyframes scan-move {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>🤖 AI Patrol Bot - 室内巡逻机器人</h1>
      <div class="links">
        <a href="/demo/index.html">Demo</a>
        <a href="/demo/inspect.html">实时巡检</a>
        <a href="/demo/batch.html">批量评测</a>
        <button class="settings-btn" id="settingsBtn">⚙ 设置</button>
      </div>
    </div>

    <div id="game-container">
      <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <p>加载游戏中...</p>
      </div>
    </div>

    <!-- Provider 设置面板 -->
    <div id="settings-overlay">
      <div class="settings-panel">
        <h2>⚙ 巡检设置</h2>
        <label for="providerSelect">VLM Provider</label>
        <select id="providerSelect">
          <option value="mock">Mock（本地模拟，无需网络）</option>
          <option value="qwen">Qwen-VL（通义千问视觉模型）</option>
          <option value="openai">OpenAI（GPT-4V）</option>
          <option value="ollama">Ollama（本地视觉模型）</option>
        </select>
        <div class="hint" id="providerHint">Mock 模式使用预设结果，适合课堂演示。</div>

        <label for="apiKeyInput">API Key（仅当前会话，不保存）</label>
        <input type="password" id="apiKeyInput" placeholder="选择 mock 可留空" />
        <div class="hint" id="keyHint">Key 仅存在内存中，关闭页面即清除。</div>

        <label for="promptSelect">Prompt 模板</label>
        <select id="promptSelect">
          <option value="game_inspection_v1">游戏巡检专用 Prompt</option>
          <option value="risk_inspection_v1">标准巡检 Prompt</option>
        </select>

        <div class="btn-row">
          <button class="btn secondary" id="settingsCancel">取消</button>
          <button class="btn primary" id="settingsSave">保存设置</button>
        </div>
      </div>
    </div>

    <!-- 相机面板（风险识别结果浮层） -->
    <div id="risk-overlay">
      <div class="risk-panel" id="riskPanel">
        <!-- 动态填充 -->
      </div>
    </div>

    <!-- Phaser 3 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <!-- 游戏脚本 -->
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/main.js"></script>
    <script>
      // 设置面板交互逻辑
      (function() {
        var settingsBtn = document.getElementById("settingsBtn");
        var settingsOverlay = document.getElementById("settings-overlay");
        var settingsCancel = document.getElementById("settingsCancel");
        var settingsSave = document.getElementById("settingsSave");
        var providerSelect = document.getElementById("providerSelect");
        var providerHint = document.getElementById("providerHint");
        var keyHint = document.getElementById("keyHint");
        var apiKeyInput = document.getElementById("apiKeyInput");

        // 打开设置面板
        settingsBtn.addEventListener("click", function() {
          settingsOverlay.classList.add("active");
          // 加载当前设置
          var saved = window.GAME_SETTINGS || {};
          if (saved.provider) providerSelect.value = saved.provider;
          if (saved.apiKey) apiKeyInput.value = saved.apiKey;
          onProviderChange();
        });

        // 关闭设置面板
        settingsCancel.addEventListener("click", function() {
          settingsOverlay.classList.remove("active");
        });

        // 保存设置
        settingsSave.addEventListener("click", function() {
          window.GAME_SETTINGS = {
            provider: providerSelect.value,
            apiKey: apiKeyInput.value.trim(),
            promptId: document.getElementById("promptSelect").value
          };
          settingsOverlay.classList.remove("active");
          // 更新按钮状态
          settingsBtn.classList.add("active");
          settingsBtn.textContent = "⚙ " + providerSelect.value;
        });

        // Provider 切换提示
        function onProviderChange() {
          var p = providerSelect.value;
          if (p === "mock") {
            providerHint.textContent = "Mock 模式使用预设结果，适合课堂演示。";
            keyHint.textContent = "Mock 模式无需 API Key。";
            apiKeyInput.disabled = true;
            apiKeyInput.placeholder = "选择 mock 可留空";
          } else if (p === "qwen") {
            providerHint.textContent = "通义千问 Qwen-VL，需 DASHSCOPE_API_KEY。";
            keyHint.textContent = "若环境变量已设置可留空，否则请输入 Key。";
            apiKeyInput.disabled = false;
            apiKeyInput.placeholder = "DASHSCOPE_API_KEY";
          } else if (p === "openai") {
            providerHint.textContent = "OpenAI GPT-4V，需 OPENAI_API_KEY。";
            keyHint.textContent = "若环境变量已设置可留空，否则请输入 Key。";
            apiKeyInput.disabled = false;
            apiKeyInput.placeholder = "OPENAI_API_KEY";
          } else if (p === "ollama") {
            providerHint.textContent = "Ollama 本地视觉模型，无需 Key。";
            keyHint.textContent = "确保 Ollama 服务已启动并拉取了视觉模型。";
            apiKeyInput.disabled = true;
            apiKeyInput.placeholder = "无需 Key";
          }
        }

        providerSelect.addEventListener("change", onProviderChange);

        // 默认设置
        if (!window.GAME_SETTINGS) {
          window.GAME_SETTINGS = { provider: "mock", apiKey: "", promptId: "game_inspection_v1" };
        }
      })();
    </script>
  </body>
</html>
