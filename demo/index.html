<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 视觉室内巡检</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">AI</span>
        <div>
          <h1>视觉室内巡检</h1>
          <p>单次多模态安全分析</p>
        </div>
      </div>
      <div class="service-state" id="serviceState"><span></span>连接服务中</div>
    </header>

    <main class="workspace">
      <form class="control-panel" aria-label="巡检配置" onsubmit="return false">
        <div class="panel-title">
          <div>
            <span class="step">01</span>
            <h2>巡检输入</h2>
          </div>
          <button class="text-btn" id="rulesBtn" type="button">查看规则</button>
        </div>

        <div class="field">
          <label for="fileInput">场景图片</label>
          <button class="upload-zone" id="uploadZone" type="button">
            <span class="upload-symbol" aria-hidden="true">+</span>
            <strong>添加图片</strong>
            <small>JPG、PNG、WebP、BMP 或 GIF，单张不超过 20MB</small>
          </button>
          <input id="fileInput" type="file" accept="image/jpeg,image/png,image/webp,image/bmp,image/gif" multiple hidden />
          <div class="preview-grid" id="previewGrid" hidden></div>
          <button class="text-btn clear-files" id="clearFilesBtn" type="button" hidden>移除全部图片</button>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="providerSelect">模型服务</label>
            <select id="providerSelect"></select>
          </div>
          <div class="field">
            <label for="promptSelect">Prompt</label>
            <select id="promptSelect"></select>
          </div>
        </div>

        <div class="field">
          <label for="apiKeyInput">API Key</label>
          <input id="apiKeyInput" type="password" autocomplete="off" placeholder="使用环境变量或临时输入" />
          <small id="apiKeyHint">密钥仅随本次请求发送</small>
        </div>

        <div class="field">
          <label for="baseUrlInput">Base URL</label>
          <input id="baseUrlInput" type="url" spellcheck="false" placeholder="https://example.com/v1" />
        </div>

        <div class="field">
          <label for="modelInput">模型名称或接入点 ID</label>
          <input id="modelInput" type="text" spellcheck="false" placeholder="vision-model-name" />
        </div>

        <details class="advanced">
          <summary>高级请求参数</summary>
          <div class="field">
            <label for="temperatureInput">Temperature <output id="temperatureValue">0.1</output></label>
            <input id="temperatureInput" type="range" min="0" max="2" step="0.1" value="0.1" />
          </div>
          <div class="field">
            <label for="headersInput">额外请求头（JSON）</label>
            <textarea id="headersInput" rows="3" spellcheck="false" placeholder='{"X-Custom-Header":"value"}'></textarea>
          </div>
          <div class="field">
            <label for="bodyInput">额外请求参数（JSON）</label>
            <textarea id="bodyInput" rows="3" spellcheck="false" placeholder='{"max_tokens":2048}'></textarea>
          </div>
        </details>

        <button class="primary-btn" id="inspectBtn" type="button" disabled>
          <span id="inspectBtnText">开始巡检</span>
          <span class="spinner" id="spinner" hidden></span>
        </button>
        <p class="form-error" id="formError" role="alert" hidden></p>
      </form>

      <section class="report-panel" aria-live="polite">
        <div class="report-toolbar">
          <div>
            <span class="step">02</span>
            <h2>巡检报告</h2>
          </div>
          <div class="report-actions" id="reportActions" hidden>
            <button class="secondary-btn" data-export="md" type="button">导出 MD</button>
            <button class="primary-btn compact" data-export="pdf" type="button">导出 PDF</button>
          </div>
        </div>

        <div class="empty-state" id="emptyState">
          <div class="empty-graphic" aria-hidden="true"><span></span><span></span><span></span></div>
          <h3>等待巡检结果</h3>
          <p>报告将在模型完成分析后显示</p>
        </div>

        <div class="report-result" id="reportResult" hidden>
          <div class="result-meta" id="resultMeta"></div>
          <article class="markdown-body" id="markdownBody"></article>
        </div>
      </section>
    </main>

    <dialog id="rulesDialog" class="rules-dialog">
      <div class="dialog-head">
        <div>
          <span class="step">规则库</span>
          <h2>室内安全判定规则</h2>
        </div>
        <button class="close-btn" id="closeRulesBtn" type="button" aria-label="关闭">×</button>
      </div>
      <div class="rule-list" id="ruleList"></div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
