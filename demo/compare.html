<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prompt 对比 - AI 视觉室内巡检</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .compare-shell { display: grid; gap: 16px; }
      .compare-panel { border: 1px solid var(--line); border-radius: 8px; background: var(--surface); box-shadow: var(--shadow); padding: 20px; }
      .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
      .form-group { display: grid; gap: 6px; }
      .form-group label { font-size: 13px; font-weight: 700; color: var(--ink); }
      .form-group .hint { font-size: 12px; color: var(--muted); }
      .form-input, .form-select { width: 100%; height: 38px; border-radius: 8px; border: 1px solid var(--line); background: #fff; color: var(--ink); padding: 0 10px; font: inherit; }
      .form-input:focus, .form-select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(15,118,110,0.12); }
      .prompt-checkbox-row { display: flex; flex-wrap: wrap; gap: 10px; }
      .prompt-checkbox-row label { display: inline-flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 400; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line); border-radius: 6px; background: var(--surface); }
      .prompt-checkbox-row label:hover { border-color: var(--accent); }
      .prompt-checkbox-row input { margin: 0; }
      .prompt-checkbox-row label.checked { border-color: var(--accent); background: #f0fdfa; color: var(--accent-strong); }
      .run-btn { min-height: 46px; border-radius: 8px; border: 1px solid var(--accent); background: var(--accent); color: #fff; font-weight: 800; font-size: 15px; cursor: pointer; width: 100%; }
      .run-btn:hover:not(:disabled) { background: var(--accent-strong); }
      .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .metrics-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
      .metrics-table th, .metrics-table td { padding: 10px 12px; text-align: center; border: 1px solid var(--line); font-size: 13px; }
      .metrics-table th { background: var(--surface-soft); color: var(--muted); font-weight: 700; }
      .metrics-table td:first-child, .metrics-table th:first-child { text-align: left; font-weight: 700; }
      .metrics-table .best { background: #f0fdfa; color: var(--accent-strong); font-weight: 800; }
      .sample-compare-table { width: 100%; border-collapse: collapse; }
      .sample-compare-table th, .sample-compare-table td { padding: 8px 10px; text-align: center; border-bottom: 1px solid var(--line); font-size: 13px; }
      .sample-compare-table th { color: var(--muted); font-weight: 700; }
      .sample-compare-table td:first-child { text-align: left; }
      .badge.ok { background: #d1fae5; color: #065f46; }
      .badge.risk { background: #fee2e2; color: #991b1b; }
      .badge.partial { background: #fef3c7; color: #92400e; }
      .loading-overlay { display: none; text-align: center; padding: 40px; }
      .loading-overlay.active { display: block; }
      .loading-overlay .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .back-link { display: inline-flex; align-items: center; gap: 4px; color: var(--accent-strong); font-size: 13px; font-weight: 700; text-decoration: none; }
      .empty-state { text-align: center; padding: 40px; color: var(--muted); }
      .summary-box { border: 1px solid var(--accent); border-radius: 8px; background: #f0fdfa; padding: 14px; margin-bottom: 16px; font-size: 14px; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Prompt 对比</p>
          <h1>多 Prompt / 多模型对比分析</h1>
        </div>
        <div class="top-actions">
          <a href="index.html" class="back-link">&larr; Demo</a>
          <a href="batch.html" class="back-link">&larr; 批量评测</a>
        </div>
      </header>

      <div class="compare-shell">
        <section class="compare-panel">
          <h2>对比配置</h2>
          <div class="config-grid">
            <div class="form-group">
              <label>数据集</label>
              <select id="datasetSelect" class="form-select">
                <option value="demo">demo（12 场景）</option>
              </select>
            </div>
            <div class="form-group">
              <label>Provider</label>
              <select id="providerSelect" class="form-select">
                <option value="mock">Mock</option>
              </select>
            </div>
            <div class="form-group" id="apiKeyGroup" style="display:none;">
              <label>API Key（可选）</label>
              <input type="password" id="apiKeyInput" class="form-input" placeholder="留空则用环境变量" />
            </div>
          </div>
          <div class="form-group">
            <label>选择对比的 Prompt 模板（至少 2 个）</label>
            <div id="promptCheckboxRow" class="prompt-checkbox-row"></div>
            <span class="hint">将用选中的 Prompt 分别对同一数据集运行，然后自动对比结果。</span>
          </div>
          <button id="runCompareBtn" class="run-btn" type="button">运行对比</button>
        </section>

        <section id="loadingOverlay" class="compare-panel loading-overlay">
          <div class="spinner"></div>
          <p style="margin-top:12px; color:var(--muted);" id="loadingText">正在运行多个 Prompt，请稍候...</p>
        </section>

        <section id="resultSection" style="display:none;">
          <div class="compare-panel">
            <h2>对比结果</h2>
            <div id="summaryBox" class="summary-box"></div>
            <h3 style="margin-top:16px;">指标对比</h3>
            <table class="metrics-table" id="metricsTable"></table>
          </div>

          <div class="compare-panel">
            <h3>逐样本对比</h3>
            <table class="sample-compare-table" id="sampleCompareTable"></table>
          </div>

          <div class="compare-panel" id="divergentSection" style="display:none;">
            <h3>差异样本（不同 Prompt 结果不一致）</h3>
            <div id="divergentList"></div>
          </div>
        </section>
      </div>
    </main>

    <script src="compare.js"></script>
  </body>
</html>
