<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>样本标注 - AI 视觉室内巡检</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .annotate-shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 16px;
        align-items: start;
      }
      .tool-panel,
      .form-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 16px;
      }
      .canvas-wrap {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-soft);
        overflow: auto;
      }
      #annotateCanvas {
        max-width: 100%;
        height: auto;
        cursor: crosshair;
      }
      .upload-row,
      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }
      .form-grid {
        display: grid;
        gap: 12px;
      }
      .field {
        display: grid;
        gap: 5px;
      }
      .field label {
        font-size: 13px;
        font-weight: 800;
      }
      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        padding: 9px 10px;
      }
      .field textarea {
        min-height: 72px;
        resize: vertical;
      }
      .risk-list {
        display: grid;
        gap: 8px;
      }
      .risk-row {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-soft);
        padding: 10px;
      }
      .risk-row-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
      }
      .mini-btn {
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        padding: 0 10px;
        font: inherit;
        font-size: 12px;
        font-weight: 800;
      }
      .mini-btn:hover {
        border-color: var(--accent);
        color: var(--accent-strong);
      }
      .status-line {
        min-height: 22px;
        color: var(--muted);
        font-size: 13px;
      }
      @media (max-width: 1080px) {
        .annotate-shell {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">自建数据</p>
          <h1>样本标注</h1>
        </div>
        <div class="top-actions">
          <a href="index.html" class="ghost-btn" style="text-decoration:none; display:inline-flex; align-items:center;">返回 Demo 展示</a>
          <a href="batch.html" class="ghost-btn" style="text-decoration:none; display:inline-flex; align-items:center;">批量评测</a>
        </div>
      </header>

      <div class="annotate-shell">
        <section class="tool-panel">
          <div class="upload-row">
            <input id="imageInput" type="file" accept="image/jpeg,image/png,image/webp,image/svg+xml" />
            <button id="clearBoxBtn" class="ghost-btn" type="button">清除当前框</button>
          </div>
          <div class="canvas-wrap">
            <canvas id="annotateCanvas" width="900" height="560"></canvas>
          </div>
          <p id="drawStatus" class="status-line">选择图片后，在图上拖拽框选风险区域。</p>
        </section>

        <aside class="form-panel">
          <div class="form-grid">
            <div class="field">
              <label for="sampleIdInput">样本 ID</label>
              <input id="sampleIdInput" type="text" placeholder="custom_001" />
            </div>
            <div class="field">
              <label for="titleInput">标题</label>
              <input id="titleInput" type="text" placeholder="宿舍插座旁水杯" />
            </div>
            <div class="field">
              <label for="sceneTypeSelect">场景类型</label>
              <select id="sceneTypeSelect">
                <option value="宿舍">宿舍</option>
                <option value="厨房">厨房</option>
                <option value="客厅">客厅</option>
                <option value="实验室">实验室</option>
                <option value="走廊">走廊</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="field">
              <label for="objectsInput">场景物体</label>
              <input id="objectsInput" type="text" placeholder="水杯, 插座, 书桌" />
            </div>
            <div class="field">
              <label for="summaryInput">样本说明</label>
              <textarea id="summaryInput" placeholder="描述画面中的主要风险或正常状态"></textarea>
            </div>

            <div class="field">
              <label for="riskTypeSelect">风险类型</label>
              <select id="riskTypeSelect"></select>
            </div>
            <div class="field">
              <label for="levelSelect">风险等级</label>
              <select id="levelSelect">
                <option value="高">高</option>
                <option value="中">中</option>
                <option value="低">低</option>
              </select>
            </div>
            <div class="field">
              <label for="riskObjectsInput">相关物体</label>
              <input id="riskObjectsInput" type="text" placeholder="水杯, 插座" />
            </div>
            <div class="field">
              <label for="locationInput">位置</label>
              <input id="locationInput" type="text" placeholder="书桌右侧靠墙区域" />
            </div>
            <div class="field">
              <label for="reasonInput">原因</label>
              <textarea id="reasonInput" placeholder="液体容器靠近插座，若倾倒可能导致短路或触电。"></textarea>
            </div>
            <div class="field">
              <label for="suggestionInput">整改建议</label>
              <textarea id="suggestionInput" placeholder="将水杯移到远离插座的位置。"></textarea>
            </div>

            <div class="action-row">
              <button id="addRiskBtn" class="primary-btn" type="button">添加风险</button>
              <button id="exportBtn" class="ghost-btn" type="button">导出 JSON</button>
              <button id="saveBtn" class="ghost-btn" type="button">保存到数据集</button>
            </div>
            <div id="saveStatus" class="status-line"></div>
            <div id="riskList" class="risk-list"></div>
          </div>
        </aside>
      </div>
    </main>

    <script src="annotate.js"></script>
  </body>
</html>
